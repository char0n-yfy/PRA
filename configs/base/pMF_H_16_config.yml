dataset:
    root: /root/autodl-tmp/imagenet
    image_size: 256
    use_flip: False

model:
    model_str: pmfDiT_H_16
    cfg_beta: 1.0
    clip_feature_dim: 1024
    dino_feature_dim: 768
    num_clip_tokens: 4
    num_dino_tokens: 4
    schedule_t0: 0.5
    lambda_perc_max: 1.0
    lambda_perc_gamma: 4.0
    lambda_perc_hard_t0: True
    lambda_sem_max: 1.0
    lambda_sem_beta: 2.0
    lambda_sem_eps: 0.0001
    lambda_sem_gate: sigmoid
    lambda_sem_gate_k: 12.0
    lambda_sem_hard_t0: True
    enable_semantic_loss: True
    attention_impl: qwen_gated  # standard / qwen_gated
    attention_gate_bias_init: 4.0

    P_mean: 0.0
    P_std: 0.8
    noise_scale: 2.0

    lpips: True
    lpips_lambda: 0.4
    convnext: True
    convnext_model_name: /root/autodl-tmp/hf_models/convnextv2-base-22k-224
    convnext_lambda: 0.1
    perceptual_max_t: 0.6
    tr_uniform: True

training:
    log_per_step: 50
    checkpoint_per_epoch: 5

    num_epochs: 320
    batch_size: 1024
    enable_distributed: True
    half_precision: True
    optimizer: muon
    learning_rate: 0.001 # for muon
    warmup_epochs: 0
    
    adam_b2: 0.95
    muon_momentum: 0.95
    muon_nesterov: True
    muon_beta1: 0.9
    muon_eps: 1.0e-8
    muon_ns_steps: 5
    muon_ns_eps: 1.0e-7
    # multiple ema
    ema_type: 'edm'
    ema_val: [1000]

    sample_per_epoch: 5

    seed: 42

fid:
    device_batch_size: 80
    num_samples: 50000
    
    cache_ref: FID_CACHE_REF

sampling:
    # sample parameters evaluated during training
    num_steps: 1
    omega: 7.0
    t_min: 0.2
    t_max: 0.6

logging:
    use_wandb: False # set to True to use wandb
    wandb_project: 'YOUR PROJECT' # change to your wandb project
    wandb_entity: 'YOUR ENTITY' # paste your wandb entity here
    wandb_tags: # use your own tags
        - YOUR TAGS
    wandb_notes: 'YOUR NOTES' # your wandb notes

condition:
    enable_semantic: True
    mode: clip_dino  # ablation: uncond / clip / dino / clip_dino
    clip_model_name: /root/autodl-tmp/hf_models/clip-vit-large-patch14
    dino_model_name: /root/autodl-tmp/hf_models/dinov2-base
    dino_use_dense: True
    device: cuda
    semantic_cache_root: /root/autodl-tmp/imagenet_sem_cache_fp32_256
    semantic_cache_strict: True

evaluation:
    enable: True
    every_n_epochs: 10
    max_samples: 1000
    batch_size: 32
    seed: 2026
    low_t: 0.2
    low_rho: 0.25
    high_t: 0.9
    high_rho: 0.9
    probe_t_values: [0.25, 0.65, 0.9]
    probe_rho_values: [0.0, 0.25, 0.65, 0.9]
    probe_pairs_per_t: 8
    probe_rho_zero_ratio: 0.25
    probe_nonzero_rho_values: [0.25, 0.65, 0.9]
    cfg_w_mid: 4.0
    cfg_w_high: 7.0
    interval_on: [0.5, 1.0]
    interval_off: [0.0, 0.5]
    num_vis: 4
    compute_fid: True
    compute_is: True
    preflight_check: True
    preflight_include_fid_is: True
    preflight_fid_num_images: 16
    preflight_fid_device_batch_size: 8
    lpips_resize: 224
    best_lpips_psnr_tradeoff: 10.0
    best_top_k: 3
    freq_hf_cutoff: 0.5
    freq_angle_bins: 16
    freq_radial_bins: 24

load_from: ''
