dataset:
  root: /path/to/imagenet
  image_size: 256
  train_split: train
  val_split: val
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  use_flip: false
  augment_train: false

semantic:
  use_offline_cache: true
  cache_root: /path/to/imagenet_sem_cache_fp32
  mode: dino
  dino_feature_dim: 768
  num_dino_tokens: 4
  strict: true

model:
  input_size: 256
  patch_size: 16
  in_channels: 3
  hidden_size: 1024
  pixel_dim: 16
  patch_depth: 14
  pixel_depth: 2
  pixel_head_depth: 1
  num_heads: 16
  pixel_num_heads: 16
  mlp_ratio: 4.0
  sem_in_dim: 768
  use_qknorm: true
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  use_checkpoint: false
  null_token_learnable: true

training:
  seed: 42
  num_epochs: 3
  batch_size: 8
  learning_rate: 3.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  use_amp: true
  amp_dtype: bf16
  class_dropout_prob: 0.1
  noise_scale: 1.0
  t_eps: 0.05

time_sampling:
  data_proportion: 0.5
  logit_mean: 0.0
  logit_std: 1.0

loss:
  norm_p: 0.5
  norm_eps: 0.001
  perceptual_max_t: 1.0
  lpips_weight: 1.0
  convnext_weight: 0.2
  enable_lpips: true
  enable_convnext: true
  convnext_model_name: facebook/convnextv2-base-22k-224

evaluation:
  enabled: false
  max_samples: 1000

logging:
  log_interval: 100
  tb: true

checkpoint:
  save_interval: 1000
  save_per_epoch: true
  keep_last_k: 3

ddp:
  backend: nccl
  find_unused_parameters: false
